# Dependabot configuration — manages version-update & security PRs across
# every dependency manifest in the monorepo.
#
# Security updates (the GitHub "Dependabot alerts" feed) are enabled at the
# repo level regardless of this file; this config additionally schedules
# grouped version-update PRs so dependencies do not silently drift and
# accumulate advisories. Groups consolidate many bumps into a single PR,
# matching the team's existing "consolidated Dependabot bumps" practice.
version: 2

updates:
  # ── Backend (Python / uv) ────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/backend_python"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      backend-python:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels: ["dependencies", "backend"]

  # ── Admin tool (Python / pip) ────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/admin_tool"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      admin-tool:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels: ["dependencies", "admin-tool"]

  # ── npm (root + web_client workspace) ────────────────────────────────────
  # web_client is an npm workspace of the root, so its dependency tree lives in
  # the root package-lock.json. A single npm entry at "/" covers both — do NOT
  # add a separate "/web_client" entry (no lockfile there; would break workspace
  # resolution).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      npm-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # eslint-plugin-react does not support ESLint 10 yet — repo is pinned to
      # ^9 (see PR #130/#135). Remove once the plugin ships ESLint 10 support.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # TypeScript 7 ships the native Go compiler (tsgo); Next.js 16.2.x
      # `hasNecessaryDependencies` does not detect it and `next build` fails with
      # "trying to use TypeScript but do not have the required package(s)".
      # See PR #200 (closed). Remove once Next.js supports tsgo.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    labels: ["dependencies", "frontend", "tooling"]

  # ── Docker base images ───────────────────────────────────────────────────
  # Every Dockerfile pins an explicit image tag (no `:latest`) so builds are
  # reproducible; these entries are what keeps those pins from going stale.
  - package-ecosystem: "docker"
    directory: "/backend_python"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker", "backend"]

  - package-ecosystem: "docker"
    directory: "/n8n"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/admin_tool"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker", "admin-tool"]

  # ── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
