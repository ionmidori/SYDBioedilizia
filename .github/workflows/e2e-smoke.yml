name: 'E2E Smoke'

on:
  push:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'web_client/**'
      - '.github/workflows/e2e-smoke.yml'
  pull_request:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'web_client/**'
      - '.github/workflows/e2e-smoke.yml'

# Least privilege: read-only checkout, artifact upload uses the default token.
permissions:
  contents: read

concurrency:
  group: 'e2e-smoke-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  smoke:
    name: 'Playwright smoke (chromium)'
    runs-on: 'ubuntu-latest'

    defaults:
      run:
        working-directory: './web_client'

    # Placeholder public config — the build/serve must not require live secrets.
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: 'ci-placeholder-api-key'
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'ci-placeholder.firebaseapp.com'
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'ci-placeholder'
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: 'ci-placeholder-recaptcha'
      NEXT_PUBLIC_ENABLE_APP_CHECK: 'false'

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: 'Set up Node.js'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Install Playwright browser (chromium)'
        run: npx playwright install --with-deps chromium

      - name: 'Production build'
        run: npm run build

      - name: 'Run smoke tests'
        run: npm run test:e2e

      - name: 'Upload Playwright report'
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: 'playwright-report'
          path: 'web_client/playwright-report/'
          retention-days: 7
          if-no-files-found: 'ignore'
