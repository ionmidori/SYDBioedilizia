name: 'Frontend Checks'

on:
  push:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'web_client/**'
      - '.github/workflows/frontend-checks.yml'
  pull_request:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'web_client/**'
      - '.github/workflows/frontend-checks.yml'

# Least privilege: read-only checkout, no write scopes needed.
permissions:
  contents: read

concurrency:
  group: 'frontend-checks-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  check:
    name: 'Audit + Type-check + Build'
    runs-on: 'ubuntu-latest'

    defaults:
      run:
        working-directory: './web_client'

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: 'Set up Node.js'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Dependency audit (supply chain security)'
        run: npm audit --audit-level=high

      - name: 'Lint'
        run: npm run lint

      - name: 'Type-check'
        run: npm run type-check

      - name: 'Unit tests (Jest) + coverage gate'
        # --coverage enforces the ratchet floors in jest.config.js
        # (coverageThreshold); the build fails if coverage regresses below them.
        run: npm test -- --ci --coverage

      - name: 'Production build (next build)'
        # Placeholder public config: the build must not require live secrets.
        # These NEXT_PUBLIC_* values only need to be syntactically present so
        # Firebase/App Check client init does not throw during static
        # generation. App Check is disabled to avoid reCAPTCHA network calls.
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: 'ci-placeholder-api-key'
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'ci-placeholder.firebaseapp.com'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'ci-placeholder'
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: 'ci-placeholder-recaptcha'
          NEXT_PUBLIC_ENABLE_APP_CHECK: 'false'
        run: npm run build
