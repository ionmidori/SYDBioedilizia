name: 'Frontend Checks'

on:
  push:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'web_client/**'
      - '.github/workflows/frontend-checks.yml'
  pull_request:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'web_client/**'

jobs:
  check:
    name: 'Audit + Type-check'
    runs-on: 'ubuntu-latest'

    defaults:
      run:
        working-directory: './web_client'

    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v4'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '22'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci
        working-directory: '.'

      - name: 'Dependency audit (supply chain security)'
        run: npm audit --audit-level=high

      - name: 'Type-check'
        run: npm run type-check
