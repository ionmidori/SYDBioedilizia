name: 'Frontend Checks'

on:
  push:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'web_client/**'
      - '.github/workflows/frontend-checks.yml'
  pull_request:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'web_client/**'

jobs:
  check:
    name: 'Audit + Type-check'
    runs-on: 'ubuntu-latest'

    defaults:
      run:
        working-directory: './web_client'

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v7

      - name: 'Set up Node.js'
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Dependency audit (supply chain security)'
        run: npm audit --audit-level=high

      - name: 'Lint'
        run: npm run lint

      - name: 'Type-check'
        run: npm run type-check

      - name: 'Unit tests (Jest)'
        run: npm test -- --ci
