name: 'Backend Python Tests'

on:
  push:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'backend_python/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches:
      - 'main'
      - 'develop'
    paths:
      - 'backend_python/**'
      - '.github/workflows/backend-tests.yml'

# Least privilege: this workflow only reads the repo and uploads coverage.
permissions:
  contents: read

# Cancel superseded runs on the same ref (saves CI minutes; keeps only the
# latest push/PR update running).
concurrency:
  group: 'backend-tests-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  test:
    name: 'Pytest CI'
    runs-on: 'ubuntu-latest'

    env:
      ENV: 'development'
      FIREBASE_STORAGE_BUCKET: 'test-bucket.firebasestorage.app'
      GOOGLE_CLOUD_PROJECT: 'chatbotluca-a8a73'

    defaults:
      run:
        working-directory: './backend_python'

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: 'Set up Python'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: 'Install uv'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 'latest'

      - name: 'Install dependencies'
        run: 'uv sync --all-extras'

      - name: 'Lint (ruff)'
        run: 'uv run ruff check src/ main.py tests/'

      - name: 'Type check (pyright)'
        # Incremental-adoption gate: blocks NEW hard type errors. Pre-existing
        # findings are baselined as warnings in pyrightconfig.json (ratchet).
        run: 'uv run pyright'

      - name: 'Dependency audit (supply chain security)'
        # CVE-2026-28277: langgraph msgpack deserialization (transitive via google-adk).
        # Post-exploitation only — requires checkpoint-store write access. No fix available yet.
        # We do not use LangGraph checkpointing; ADK uses InMemorySessionService.
        run: uv run pip-audit --strict --desc --ignore-vuln CVE-2026-28277

      - name: 'Run tests + coverage gate'
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GOOGLE_API_KEY: '${{ secrets.GOOGLE_API_KEY }}'
        # --cov-fail-under is a ratchet floor (current total ~59%), not the goal.
        # Raise it as coverage improves.
        run: |
          uv run pytest -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=55 -m "not integration"

      - name: 'Upload coverage'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: 'backend_python/coverage.xml'
          flags: 'backend-python'
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: '${{ secrets.CODECOV_TOKEN }}'
