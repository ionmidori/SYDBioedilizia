name: 'Security Audit (root npm + admin_tool)'

# Closes the CI coverage gap: backend_python (pip-audit) and web_client
# (npm audit) are already gated in their own workflows, but the root npm
# tooling lockfile and the admin_tool Python deps had no audit gate, so
# advisories there only surfaced via the Dependabot dashboard. This job
# fails the build on actionable (production-affecting) vulnerabilities.

on:
  push:
    branches: ['main', 'develop']
    paths:
      - 'package-lock.json'
      - 'package.json'
      - 'admin_tool/requirements.txt'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: ['main', 'develop']
    paths:
      - 'package-lock.json'
      - 'package.json'
      - 'admin_tool/requirements.txt'
      - '.github/workflows/security-audit.yml'
  schedule:
    # Weekly safety net — catches newly-published advisories even when no
    # manifest changed.
    - cron: '0 6 * * 1'

# Least privilege: audit jobs only read the repo.
permissions:
  contents: read

concurrency:
  group: 'security-audit-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  root-npm-audit:
    name: 'Root npm audit'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22'
      # Production deps must be clean at high+. Dev-only advisories (e.g. the
      # jest/gray-matter js-yaml chain) are managed via Dependabot PRs rather
      # than blocking CI.
      - name: 'Audit production dependencies (fail on high/critical)'
        run: npm audit --omit=dev --audit-level=high

  admin-tool-audit:
    name: 'admin_tool pip-audit'
    runs-on: 'ubuntu-latest'
    defaults:
      run:
        working-directory: './admin_tool'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: 'Install pip-audit'
        run: pip install pip-audit
      - name: 'Audit admin_tool requirements'
        run: pip-audit -r requirements.txt --desc
